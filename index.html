<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kota Ogino | App Support</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="container">
    <h1>Apps</h1>

    <div class="app-grid">

      <article class="app-card app-card-covered">

        <div class="app-top">
          <img class="app-icon-image" src="studynow.png" alt="Study Now JLPT app icon"/>
          <div>
            <h3>Study Now:JLPT</h3>
            <p>Focus-first JLPT study with Screen Time tools</p>
          </div>
        </div>

        <!-- TEMP COVER: remove when released -->
        <div class="app-release-cover">
          <div class="app-release-cover-inner">
            <span class="app-release-badge">Coming soon</span>
            <h3 class="app-release-title">New App</h3>
            <p class="app-release-copy">Details will be available after release.</p>
          </div>
        </div>

      </article>

    </div>

  </main>

</body>
</html>
